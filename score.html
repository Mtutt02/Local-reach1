<style>
:root { --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d; --text:#e6edf3; --text2:#8b949e; --accent:#58a6ff; --green:#3fb950; --orange:#d29922; --red:#f85149; --purple:#bc8cff; --radius:8px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
.container { max-width:1200px; margin:0 auto; padding:24px 20px; }
h1 { font-size:24px; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
.sub { color:var(--text2); margin-bottom:20px; }

/* Controls */
.controls { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.controls input { padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; width:200px; outline:none; }
.controls input:focus { border-color:var(--accent); }
.controls select { padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; outline:none; }
.controls .badge { padding:4px 12px; border-radius:12px; font-size:12px; font-weight:600; }
.badge-high { background:#3a1a1a; color:var(--red); }
.badge-medium { background:#2a2a1a; color:var(--orange); }
.badge-low { background:#1a2a1a; color:var(--green); }
.badge-lr { background:#1a3a2a; color:var(--green); }
.badge-aaa { background:#2a1a3a; color:var(--purple); }

/* Summary */
.summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; margin-bottom:20px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; text-align:center; }
.stat-card .num { font-size:22px; font-weight:700; }
.stat-card .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

/* Prospect Cards */
.prospect-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:8px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; cursor:pointer; transition:0.15s; }
.card:hover { border-color:var(--accent); }
.card .top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.card .name { font-weight:600; font-size:14px; }
.card .venture { font-size:10px; padding:1px 6px; border-radius:8px; }
.card .venture.lr { background:#1a3a2a; color:var(--green); }
.card .venture.aaa { background:#2a1a3a; color:var(--purple); }
.card .meta { font-size:12px; color:var(--text2); margin-bottom:4px; line-height:1.6; }
.card .score-bar { height:4px; background:var(--surface2); border-radius:2px; margin:6px 0; overflow:hidden; }
.card .score-fill { height:100%; border-radius:2px; transition:width 0.3s; }
.card .score-fill.high { background:var(--green); }
.card .score-fill.medium { background:var(--orange); }
.card .score-fill.low { background:var(--red); }
.card .actions { display:flex; gap:4px; margin-top:6px; }
.card .actions button { padding:3px 10px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:11px; transition:0.15s; }
.card .actions button:hover { background:var(--surface2); color:var(--text); }
.card .tags { display:flex; gap:3px; flex-wrap:wrap; margin-top:4px; }
.card .tag { font-size:10px; padding:1px 6px; border-radius:6px; background:var(--surface2); color:var(--text2); }

/* Detail modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h2 { font-size:18px; margin-bottom:12px; }
.modal .section { margin-bottom:16px; }
.modal .section h3 { font-size:13px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.modal p { font-size:13px; line-height:1.6; }
.modal .pre-msg { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:12px; font-size:12px; line-height:1.6; white-space:pre-wrap; margin-top:6px; }
.modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
.btn { padding:8px 16px; border-radius:6px; border:none; cursor:pointer; font-size:13px; font-weight:600; transition:0.15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#4a96e6; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }

.empty { text-align:center; padding:60px 20px; color:var(--text2); }

@media (max-width:700px) {

}

// Scoring engine
function scoreProspect(p) {
  let score = 50; // base
  const factors = [];
  
  // Review gap (bigger = more urgent = higher score)
  const reviewWeight = Math.min(25, p.gap * 0.3);
  score += reviewWeight;
  if (p.gap > 50) factors.push('💰 Huge review gap (+' + reviewWeight.toFixed(0) + ')');
  else if (p.gap > 25) factors.push('📊 Significant review gap (+' + reviewWeight.toFixed(0) + ')');
  else if (p.gap > 10) factors.push('📈 Moderate review gap (+' + reviewWeight.toFixed(0) + ')');
  
  // Low response rate = easy improvement = higher score
  if (p.responseRate < 20) {
    score += 10;
    factors.push('⚡ Low response rate (+10) — easy win');
  } else if (p.responseRate < 50) {
    score += 5;
    factors.push('✅ Room to improve response rate (+5)');
  }
  
  // No posts = high urgency
  if (p.posts === 0) {
    score += 8;
    factors.push('📝 No Google Posts (+8) — quick fix');
  }
  
  // Venture bonus (AAA has higher retainer potential)
  if (p.venture === 'aaa') {
    score += 5;
    factors.push('🤖 AAA venture (+5) — higher retainer potential');
  }
  
  // Urgency tag
  if (p.urgency === 'high') {
    score += 5;
    factors.push('🔥 High urgency signal (+5)');
  }
  
  // Cap at 100
  score = Math.min(100, Math.round(score));
  
  let level = 'low', levelLabel = '💤 Cold';
  if (score >= 75) { level = 'high'; levelLabel = '🔥 Hot'; }
  else if (score >= 55) { level = 'medium'; levelLabel = '⚡ Warm'; }
  
  return { score, level, levelLabel, factors };
}

// Apply scoring
function scoreAll() {
  PROSPECTS.forEach(p => {
    Object.assign(p, scoreProspect(p));
  });
  PROSPECTS.sort((a, b) => b.score - a.score);
}
scoreAll();

// Render
function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const vf = document.getElementById('venture-filter').value;
  const pf = document.getElementById('priority-filter').value;
  const ind = document.getElementById('industry-filter').value;
  
  // Populate industry filter
  const industries = [...new Set(PROSPECTS.map(p => p.industry))].sort();
  const indSel = document.getElementById('industry-filter');
  industries.forEach(i => {
    if (![...indSel.options].some(o => o.value === i)) {
      const o = document.createElement('option'); o.value = i; o.textContent = i;
      indSel.appendChild(o);
    }
  });
  
  // Filter
  const filtered = PROSPECTS.filter(p => {
    const m = p.name.toLowerCase().includes(q) || p.contact.toLowerCase().includes(q) || p.city.toLowerCase().includes(q);
    const v = vf === 'all' || p.venture === vf;
    const pr = pf === 'all' || p.level === pf;
    const i = ind === 'all' || p.industry === ind;
    return m && v && pr && i;
  });
  
  // Summary
  const high = filtered.filter(p => p.level === 'high').length;
  const med = filtered.filter(p => p.level === 'medium').length;
  const low = filtered.filter(p => p.level === 'low').length;
  document.getElementById('summary').innerHTML = `
    <div class="stat-card"><div class="num" style="color:var(--red)">${high}</div><div class="label">🔥 Hot</div></div>
    <div class="stat-card"><div class="num" style="color:var(--orange)">${med}</div><div class="label">⚡ Warm</div></div>
    <div class="stat-card"><div class="num" style="color:var(--green)">${low}</div><div class="label">💤 Cold</div></div>
    <div class="stat-card"><div class="num">${filtered.length}</div><div class="label">Total Shown</div></div>
  `;
  document.getElementById('count-display').textContent = `${filtered.length} of ${PROSPECTS.length} prospects`;
  
  // Grid
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No prospects match your filters</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(p => `
    <div class="card" onclick="openModal('${p.id}')">
      <div class="top">
        <div class="name">${p.name}</div>
        <div class="venture ${p.venture}">${p.venture === 'lr' ? 'LR' : 'AAA'}</div>
      </div>
      <div class="meta">${p.industry} · ${p.city} · ${p.contact}</div>
      <div class="score-bar"><div class="score-fill ${p.level}" style="width:${p.score}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;">
        <span style="font-weight:600;">${p.levelLabel}</span>
        <span style="color:var(--text2);">${p.score}/100 · ${p.reviews} reviews · ${p.gap} gap</span>
      </div>
      <div class="meta" style="margin-top:4px;font-size:11px;color:var(--text2);">${p.quote}</div>
      <div class="actions">
        <button onclick="event.stopPropagation();copyDirect('${p.msg.replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">📋 Copy DM</button>
      </div>
    </div>
  `).join('');
}

function filter() { render(); }

function openModal(id) {
  const p = PROSPECTS.find(x => x.id === id);
  if (!p) return;
  selectedProspect = p;
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-venture').textContent = (p.venture === 'lr' ? 'Local Reach' : 'Rex AAA');
  document.getElementById('modal-score').innerHTML = `<div class="score-bar" style="max-width:300px;"><div class="score-fill ${p.level}" style="width:${p.score}%;height:8px;"></div></div><span style="font-size:16px;font-weight:700;">${p.score}/100 — ${p.levelLabel}</span>`;
  document.getElementById('modal-why').innerHTML = p.factors.map(f => '<div>• ' + f + '</div>').join('');
  document.getElementById('modal-contact').innerHTML = `<strong>${p.contact}</strong> · ${p.phone} · ${p.city}<br>${p.industry} · ${p.reviews} reviews · ${p.gap} review gap`;
  document.getElementById('modal-msg').textContent = p.msg;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); selectedProspect = null; }

function copyMsg() {
  if (!selectedProspect) return;
  const text = selectedProspect.msg;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-actions .btn-primary');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Message', 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
}

function copyDirect(text) {
  navigator.clipboard.writeText(text.replace(/\\n/g, '\n')).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy DM', 2000);
  });
}

// Init
render();
</script>
</body>
</html>
