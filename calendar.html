<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rex Content Calendar — GBP Post Scheduler</title>
<style>
:root {
  --bg: #f8f9fa; --surface: #fff; --border: #e5e7eb;
  --text: #1a1a2e; --text2: #6b7280;
  --accent: #4f46e5; --accent2: #0f3460;
  --green: #22c55e; --orange: #eab308; --red: #ef4444; --purple: #8b5cf6;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
h1 { font-size:24px; margin-bottom:4px; }
.sub { color:var(--text2); margin-bottom:20px; }

/* Controls */
.controls { display:flex; gap:12px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
.controls h2 { font-size:18px; min-width:200px; }
.controls button { padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); cursor:pointer; font-size:13px; transition:0.15s; }
.controls button:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.controls select { padding:6px 12px; border-radius:8px; border:1px solid var(--border); font-size:13px; }

/* Calendar Grid */
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.day-header { text-align:center; font-size:11px; text-transform:uppercase; color:var(--text2); padding:8px 0; font-weight:600; letter-spacing:0.5px; }
.day { background:var(--surface); border:1px solid var(--border); border-radius:6px; min-height:100px; padding:6px; font-size:12px; }
.day .date { font-weight:600; margin-bottom:4px; color:var(--text2); }
.day.today { border-color:var(--accent); background:#f5f3ff; }
.day.other-month { opacity:0.4; }
.day .post { padding:3px 5px; border-radius:4px; margin-bottom:2px; cursor:pointer; font-size:11px; line-height:1.3; transition:0.1s; }
.day .post:hover { filter:brightness(0.95); }
.day .post.r1 { background:#dbeafe; color:#1e40af; }
.day .post.r2 { background:#dcfce7; color:#166534; }
.day .post.r3 { background:#fef3c7; color:#92400e; }
.day .post.r4 { background:#f3e8ff; color:#6b21a8; }
.day .post.r5 { background:#fce7f3; color:#9d174d; }
.day .add-btn { display:block; text-align:center; font-size:16px; color:var(--text2); cursor:pointer; padding:2px; border-radius:4px; }
.day .add-btn:hover { background:var(--accent); color:#fff; }

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border-radius:12px; padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h3 { font-size:18px; margin-bottom:16px; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:#444; margin-bottom:4px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 12px; border:2px solid var(--border); border-radius:8px; font-size:13px; outline:none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); }
.form-group textarea { min-height:60px; resize:vertical; }
.btn { padding:8px 20px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:600; transition:0.15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-danger { background:var(--red); color:#fff; }
.btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
.modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }

/* Post bank */
.post-bank { margin-top:24px; }
.post-bank h3 { font-size:14px; margin-bottom:8px; }
.post-bank .tags { display:flex; gap:4px; flex-wrap:wrap; }
.post-bank .tag { padding:4px 10px; border-radius:12px; font-size:11px; cursor:pointer; border:1px solid var(--border); transition:0.15s; }
.post-bank .tag:hover { border-color:var(--accent); background:#f5f3ff; }
.post-bank .tag.active { border-color:var(--accent); background:var(--accent); color:#fff; }

/* Industry templates */
.template-select { margin-bottom:12px; }
.template-select select { width:100%; padding:8px 12px; border:2px solid var(--border); border-radius:8px; font-size:13px; }

@media (max-width:700px) {
  .calendar { grid-template-columns:repeat(1,1fr); }
  .day-header { display:none; }
}
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <h1>📅 Content Calendar</h1>
      <p class="sub">Schedule Google Business Profile posts. Click a date to add content.</p>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevMonth()">←</button>
    <h2 id="month-label">June 2026</h2>
    <button onclick="nextMonth()">→</button>
    <select id="client-select" onchange="loadCalendar()">
      <option value="demo">Demo: Garcia Roofing</option>
      <option value="demo2">Demo: Truth BBQ</option>
    </select>
    <button onclick="generateMonth()">✨ Auto-Fill Month</button>
    <button onclick="exportCalendar()">📥 Export</button>
  </div>

  <!-- Calendar Grid -->
  <div class="calendar" id="calendar-grid"></div>

  <!-- Post Bank -->
  <div class="post-bank">
    <h3>💡 Post Templates</h3>
    <div class="tags" id="template-tags"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modal-title">Add Post</h3>
      <div class="form-group">
        <label>Post Type</label>
        <select id="post-type">
          <option value="whatsnew">What's New</option>
          <option value="event">Event</option>
          <option value="offer">Offer</option>
          <option value="product">Product</option>
        </select>
      </div>
      <div class="form-group">
        <label>Post Content</label>
        <textarea id="post-content" placeholder="Write your Google Post here... (max 1500 chars)" maxlength="1500"></textarea>
        <div style="font-size:11px;color:var(--text2);text-align:right;"><span id="char-count">0</span>/1500</div>
      </div>
      <div class="form-group">
        <label>CTA Button Label (optional)</label>
        <input type="text" id="post-cta" placeholder="e.g. Learn More, Book Now, Order">
      </div>
      <div class="form-group">
        <label>CTA URL (optional)</label>
        <input type="url" id="post-url" placeholder="https://yoursite.com/offer">
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="delete-btn" style="display:none;" onclick="deletePost()">🗑️ Delete</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="savePost()">💾 Save Post</button>
      </div>
    </div>
  </div>
</div>

<script>
// State
let currentDate = new Date(2026, 5, 19); // June 2026
let posts = {};
let editingDate = null;
let editingIndex = -1;

const INDUSTRY_TEMPLATES = {
  roofing: [
    { type:'whatsnew', text:'🏠 Just completed a full roof replacement in {neighborhood}! Before and after photos coming soon.', cta:'See Our Work', url:'#' },
    { type:'offer', text:'🔥 Summer special: Free roof inspection + 10% off repairs. Limited time — call today!', cta:'Book Inspection', url:'#' },
    { type:'whatsnew', text:'⭐ New review from {customer}: "Best roofing company in Houston! Fast, professional, and clean."', cta:'Read Reviews', url:'#' },
    { type:'event', text:'📅 Community event: Free roof health check at Houston Home Expo this Saturday!', cta:'Get Tickets', url:'#' },
    { type:'whatsnew', text:'💡 Tip: Check your attic for leaks after heavy rain. Catching issues early saves thousands.', cta:'Learn More', url:'#' },
    { type:'whatsnew', text:'✅ Licensed, insured, and bonded. Over 500 roofs replaced in Houston since 2018.', cta:'Get a Quote', url:'#' },
    { type:'offer', text:'🎯 Refer a neighbor and both get $200 off your next service. Share the savings!', cta:'Refer Now', url:'#' },
    { type:'product', text:'🔨 Going solar? We install solar-ready roofing systems. Energy savings start day one.', cta:'Learn About Solar', url:'#' }
  ],
  restaurant: [
    { type:'offer', text:'🍖 Weekend special: 20% off all BBQ plates this Friday-Sunday! Come get it while it lasts.', cta:'View Menu', url:'#' },
    { type:'whatsnew', text:'🔥 Smoked brisket just came off the pit. 14-hour smoke, perfect bark. Stop by!', cta:'Order Now', url:'#' },
    { type:'event', text:'🎵 Live music this Saturday 7-10PM! Local artist featuring. Reserve your table.', cta:'Reserve Table', url:'#' },
    { type:'whatsnew', text:'⭐ "Best brisket in Texas hands down!" - Thanks {customer} for the 5-star review!', cta:'Leave a Review', url:'#' },
    { type:'offer', text:'🍺 Happy Hour: $5 craft beers and half-off appetizers 4-7PM weekdays.', cta:'See Happy Hour', url:'#' },
    { type:'product', text:'🥩 New on the menu: Smoked prime rib, available Friday and Saturday only.', cta:'View Menu', url:'#' },
    { type:'whatsnew', text:'📸 Tag us in your food photos for a chance to win a free dinner for two!', cta:'Follow Us', url:'#' },
    { type:'offer', text:'🎂 Birthday special: Free dessert with any entree on your birthday month!', cta:'Make Reservation', url:'#' }
  ],
  hvac: [
    { type:'offer', text:'❄️ Summer AC tune-up special: $89. Includes full inspection and filter replacement.', cta:'Book Now', url:'#' },
    { type:'whatsnew', text:'💡 Quick tip: Replace your AC filter every 30 days during summer. Saves 15% on energy.', cta:'More Tips', url:'#' },
    { type:'offer', text:'🚨 24/7 emergency AC repair. Same-day service in most areas. Call now!', cta:'Call for Service', url:'#' },
    { type:'whatsnew', text:'⭐ "AC went out at 2AM. They were here by 3AM and fixed by 4AM. Unreal service."', cta:'Read Reviews', url:'#' },
    { type:'offer', text:'🔥 Fall furnace inspection: $79. Don\'t wait until the first cold snap!', cta:'Schedule Now', url:'#' },
    { type:'product', text:'🆕 New: Smart thermostat installation + system optimization. Save 20% on energy.', cta:'Learn More', url:'#' }
  ],
  realestate: [
    { type:'whatsnew', text:'🏡 Just listed: 3BR/2BA in {neighborhood}! Open house this Sunday 1-4PM.', cta:'View Listing', url:'#' },
    { type:'offer', text:'📊 Free home valuation: Find out what your home is worth in today\'s market.', cta:'Get Valuation', url:'#' },
    { type:'whatsnew', text:'💰 Market update: {city} home values up 8% year-over-year. Sellers market continues.', cta:'Full Report', url:'#' },
    { type:'event', text:'🏠 First-time homebuyer webinar: Learn the process from start to finish.', cta:'Register Now', url:'#' },
    { type:'whatsnew', text:'⭐ "Sarah found us our dream home in 2 weeks. Couldn\'t have asked for a better agent!"', cta:'Read More', url:'#' },
    { type:'whatsnew', text:'🔑 Just closed: Congratulations to the {customer} family on their new home!', cta:'See More Closings', url:'#' }
  ],
  dental: [
    { type:'offer', text:'🦷 New patient special: Exam + X-rays + cleaning $99. Dental care for the whole family.', cta:'Book Appointment', url:'#' },
    { type:'whatsnew', text:'😁 Before and after: Cosmetic bonding transformation. 2 visits, incredible results.', cta:'View Gallery', url:'#' },
    { type:'offer', text:'✨ Teeth whitening special: $199 (reg $399). Brighten your smile for summer!', cta:'Book Now', url:'#' },
    { type:'whatsnew', text:'💡 Tip: Brushing twice a day isn\'t enough. Flossing prevents 80% of gum disease.', cta:'Dental Tips', url:'#' },
    { type:'offer', text:'👶 Kids dental visit: Free exam for children under 12 with any adult appointment.', cta:'Schedule Visit', url:'#' },
    { type:'whatsnew', text:'⭐ "Dr. Chen is amazing. My 5-year-old actually looks forward to dentist visits!"', cta:'Leave Review', url:'#' }
  ]
};

const INDUSTRY_NAMES = { roofing:'Roofing', restaurant:'Restaurant', hvac:'HVAC', realestate:'Real Estate', dental:'Dental' };

// Initialize
loadCalendar();

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = new Date();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDay = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  
  document.getElementById('month-label').textContent = 
    firstDay.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  
  // Day headers
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const div = document.createElement('div');
    div.className = 'day-header';
    div.textContent = d;
    grid.appendChild(div);
  });
  
  // Empty cells before first day
  for (let i = 0; i < startDay; i++) {
    const div = document.createElement('div');
    div.className = 'day other-month';
    grid.appendChild(div);
  }
  
  // Days
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
    
    const div = document.createElement('div');
    div.className = `day${isToday ? ' today' : ''}`;
    div.innerHTML = `<div class="date">${day}</div>`;
    
    // Show posts for this day
    const dayPosts = posts[dateStr] || [];
    dayPosts.forEach((post, i) => {
      const el = document.createElement('div');
      el.className = `post r${(i % 5) + 1}`;
      el.textContent = post.text.substring(0, 60) + (post.text.length > 60 ? '...' : '');
      el.onclick = () => openEditModal(dateStr, i);
      div.appendChild(el);
    });
    
    // Add button
    const addBtn = document.createElement('div');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+';
    addBtn.onclick = () => openAddModal(dateStr);
    div.appendChild(addBtn);
    
    grid.appendChild(div);
  }
  
  // Load post bank templates
  renderTemplateBank();
}

function renderTemplateBank() {
  const container = document.getElementById('template-tags');
  container.innerHTML = '';
  
  // Show templates for selected industry
  Object.entries(INDUSTRY_TEMPLATES).forEach(([key, tempaltes]) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = INDUSTRY_NAMES[key] || key;
    tag.onclick = () => applyIndustryTemplate(key);
    container.appendChild(tag);
  });
}

function applyIndustryTemplate(industry) {
  const templates = INDUSTRY_TEMPLATES[industry];
  if (!templates) return;
  
  // Find first empty day and add template
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  let dayIdx = 1;
  templates.forEach((tmpl, i) => {
    if (dayIdx > daysInMonth) return;
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dayIdx).padStart(2,'0')}`;
    if (!posts[dateStr]) posts[dateStr] = [];
    posts[dateStr].push({
      type: tmpl.type,
      text: tmpl.text.replace('{neighborhood}', 'Heights').replace('{customer}', 'John D.').replace('{city}', 'Houston'),
      cta: tmpl.cta || '',
      url: tmpl.url || ''
    });
    dayIdx += Math.floor(6 / templates.length) + 1;
    if (dayIdx > daysInMonth) dayIdx = i + 1;
  });
  
  savePosts();
  renderCalendar();
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}
function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

function loadCalendar() {
  const saved = localStorage.getItem('rex_content_calendar');
  if (saved) {
    posts = JSON.parse(saved);
  }
  renderCalendar();
}

function savePosts() {
  localStorage.setItem('rex_content_calendar', JSON.stringify(posts));
}

function openAddModal(dateStr) {
  editingDate = dateStr;
  editingIndex = -1;
  document.getElementById('modal-title').textContent = `📝 Add Post — ${dateStr}`;
  document.getElementById('post-type').value = 'whatsnew';
  document.getElementById('post-content').value = '';
  document.getElementById('post-cta').value = '';
  document.getElementById('post-url').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('modal').classList.add('show');
}

function openEditModal(dateStr, index) {
  editingDate = dateStr;
  editingIndex = index;
  const post = posts[dateStr][index];
  
  document.getElementById('modal-title').textContent = `✏️ Edit Post — ${dateStr}`;
  document.getElementById('post-type').value = post.type || 'whatsnew';
  document.getElementById('post-content').value = post.text || '';
  document.getElementById('post-cta').value = post.cta || '';
  document.getElementById('post-url').value = post.url || '';
  document.getElementById('char-count').textContent = (post.text || '').length;
  document.getElementById('delete-btn').style.display = 'inline-block';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingDate = null;
  editingIndex = -1;
}

function savePost() {
  if (!editingDate) return;
  
  const type = document.getElementById('post-type').value;
  const text = document.getElementById('post-content').value.trim();
  const cta = document.getElementById('post-cta').value.trim();
  const url = document.getElementById('post-url').value.trim();
  
  if (!text) { alert('Please enter post content'); return; }
  
  if (!posts[editingDate]) posts[editingDate] = [];
  
  const post = { type, text, cta, url };
  
  if (editingIndex >= 0) {
    posts[editingDate][editingIndex] = post;
  } else {
    posts[editingDate].push(post);
  }
  
  savePosts();
  closeModal();
  renderCalendar();
}

function deletePost() {
  if (editingDate === null || editingIndex < 0) return;
  if (!confirm('Delete this post?')) return;
  
  posts[editingDate].splice(editingIndex, 1);
  if (posts[editingDate].length === 0) delete posts[editingDate];
  
  savePosts();
  closeModal();
  renderCalendar();
}

function generateMonth() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  // Clear existing posts for this month
  for (const key in posts) {
    if (key.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) {
      delete posts[key];
    }
  }
  
  // Generate 8 posts spread throughout the month
  const industries = Object.keys(INDUSTRY_TEMPLATES);
  const industry = industries[Math.floor(Math.random() * industries.length)];
  const templates = INDUSTRY_TEMPLATES[industry];
  
  const spacing = Math.floor(daysInMonth / Math.min(templates.length, 8));
  const neighborhoods = ['Heights', 'Montrose', 'Memorial', 'Katy', 'Sugar Land', 'Kingwood', 'Pearland', 'The Woodlands'];
  const customers = ['Mike & Sarah', 'The Johnsons', 'David R.', 'Lisa M.', 'Tom & Carol', 'Jennifer', 'Robert'];
  
  templates.slice(0, 8).forEach((tmpl, i) => {
    const day = Math.min(1 + (i * spacing), daysInMonth);
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    if (!posts[dateStr]) posts[dateStr] = [];
    posts[dateStr].push({
      type: tmpl.type,
      text: tmpl.text
        .replace('{neighborhood}', neighborhoods[Math.floor(Math.random() * neighborhoods.length)])
        .replace('{customer}', customers[Math.floor(Math.random() * customers.length)])
        .replace('{city}', 'Houston'),
      cta: tmpl.cta || '',
      url: tmpl.url || ''
    });
  });
  
  savePosts();
  renderCalendar();
  alert(`✨ Generated 8 posts for ${new Date(year, month).toLocaleDateString('en-US', {month:'long', year:'numeric'})}`);
}

function exportCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const client = document.getElementById('client-select').value;
  
  let text = `=== Content Calendar Export ===\n`;
  text += `Client: ${client}\n`;
  text += `Month: ${new Date(year, month).toLocaleDateString('en-US', {month:'long', year:'numeric'})}\n`;
  text += `Generated: ${new Date().toLocaleString()}\n\n`;
  
  // Sort dates
  const sorted = Object.keys(posts)
    .filter(d => d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`))
    .sort();
  
  sorted.forEach(dateStr => {
    const dayPosts = posts[dateStr];
    dayPosts.forEach(post => {
      text += `--- ${dateStr} ---\n`;
      text += `Type: ${post.type}\n`;
      text += `Post: ${post.text}\n`;
      if (post.cta) text += `CTA: ${post.cta}\n`;
      if (post.url) text += `URL: ${post.url}\n`;
      text += '\n';
    });
  });
  
  // Copy to clipboard
  navigator.clipboard.writeText(text).then(() => {
    alert('📋 Calendar exported to clipboard!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('📋 Calendar exported to clipboard!');
  });
}

// Char count
document.getElementById('post-content').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length;
});
</script>
</body>
</html>
